name: Weekly Italian Quiz

on:
  schedule:
    # 12:00 PM UTC = 13:00 CET (winter) / 11:00 AM UTC = 13:00 CEST (summer)
    - cron: '0 12 * * 0'  # Every Sunday at 12:00 UTC (13:00 Rome time)
  workflow_dispatch:

jobs:
  send-quiz:
    name: Send Weekly Quiz
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install python-telegram-bot==21.0 pytz==2024.1

      - name: Run Weekly Quiz
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python -c "
          import asyncio
          from italian_word_bot import ItalianWordBot

          # Note: The workflow uses a shorter delay (5s) between questions because
          # the quiz interaction happens asynchronously via Telegram callbacks.
          # Users answer at their own pace through the inline keyboard buttons.
          # The longer delays in the bot's run_weekly_quiz method are for live
          # polling mode where we want to pace the questions.
          WORKFLOW_QUESTION_DELAY_SECONDS = 5

          async def run_quiz():
              bot = ItalianWordBot()
              
              # Create a mock context for the quiz
              class MockBotData:
                  def __init__(self):
                      self._data = {}
                  def __getitem__(self, key):
                      return self._data.get(key, '')
                  def __setitem__(self, key, value):
                      self._data[key] = value
                  def get(self, key, default=''):
                      return self._data.get(key, default)
              
              class MockContext:
                  def __init__(self):
                      self.bot_data = MockBotData()
              
              context = MockContext()
              await bot.send_quiz_intro()
              
              # Get quiz words and send questions
              quiz_words = bot.get_quiz_words()
              total_questions = len(quiz_words)
              
              for i, word_data in enumerate(quiz_words, 1):
                  await bot.send_quiz_question(i, total_questions, word_data, context)
                  await asyncio.sleep(WORKFLOW_QUESTION_DELAY_SECONDS)
              
              print('Quiz questions sent successfully!')

          asyncio.run(run_quiz())
          "

      - name: Commit updated history
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add weekly_history.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update weekly history after quiz [skip ci]"
            git push
          fi
