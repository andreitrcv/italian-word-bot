name: Italian Word Bot

on:
  schedule:
    # 7:00 UTC → 8:00 CET (winter) / 9:00 CEST (summer) → matches your 8:00 Rome time
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  send-word:
    name: Send Word of the Day
    runs-on: ubuntu-latest
    permissions:
      contents: write

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install python-telegram-bot==21.0 pytz==2024.1

      - name: Send Word of the Day
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python -c "
          import asyncio
          from italian_word_bot import ItalianWordBot
          bot = ItalianWordBot()
          asyncio.run(bot.send_morning_message())
          "

      - name: Save sent words history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add sent_words.json
          
          # Only commit and push if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update sent_words.json"
            git push
          fi
